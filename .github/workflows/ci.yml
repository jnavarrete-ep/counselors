name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 20
            test-command: npm run test
          - os: ubuntu-latest
            node-version: 22
            test-command: npm run test
          - os: ubuntu-latest
            node-version: 24
            test-command: npm run test
          - os: windows-latest
            node-version: 22
            test-command: npm run test -- tests/unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: ${{ matrix.test-command }}
